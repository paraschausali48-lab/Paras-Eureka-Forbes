name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Compiler Check
        run: npx tsc --noEmit

      - name: Unit Tests (Vitest)
        run: npx vitest run

      - name: Install Playwright Browsers & Run E2E
        run: |
          npx playwright install --with-deps
          npx playwright test

      - name: Production Build Verification
        run: npm run build
